<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapostad</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000,#111,#1a1a1a);
overflow:hidden;
color:white;
}

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:#00ffd5;
filter:blur(180px);
opacity:.2;
animation:move 8s infinite alternate;
}

@keyframes move{
from{transform:translate(-250px,-150px);}
to{transform:translate(250px,150px);}
}

.card{
position:relative;
padding:50px;
border:1px solid rgba(255,255,255,.15);
border-radius:25px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
text-align:center;
box-shadow:0 0 40px rgba(0,255,255,.25);
}

h1{
font-size:60px;
color:#00ffe5;
text-shadow:0 0 20px #00ffe5;
margin-bottom:20px;
}

p{
font-size:22px;
opacity:.85;
margin-bottom:30px;
}

button{
padding:15px 35px;
border:none;
border-radius:50px;
background:#00ffe5;
color:#000;
font-size:20px;
cursor:pointer;
transition:.3s;
font-weight:bold;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 30px #00ffe5;
}
</style>

</head>
<body>

<div class="card">
<h1>RAPOSTAD</h1>
<p>به دنیای آینده خوش اومدی 🚀</p>

<button onclick="alert('به سایت Rapostad خوش آمدید ❤️')">
شروع کن
</button>

</div>

</body>
</html>
